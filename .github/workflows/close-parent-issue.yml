name: Close Parent Issue

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  close-parent:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'sub-issue')

    steps:
      - name: Find and close parent if all sub-issues done
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BODY="${{ github.event.issue.body }}"

          # Extract parent issue number from body: "Parent: #N"
          PARENT_NUM=$(echo "$BODY" | grep -oP 'Parent:\s*#\K[0-9]+' | head -1)

          if [ -z "$PARENT_NUM" ]; then
            echo "No parent issue found in body — skipping"
            exit 0
          fi

          echo "Parent issue: #$PARENT_NUM"

          # Get all open sub-issues that reference this parent
          OPEN_SUBS=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "sub-issue" \
            --state open \
            --limit 100 \
            --json number,body \
            --jq "[.[] | select(.body | test(\"Parent:\\\\s*#${PARENT_NUM}\"))] | length")

          echo "Open sub-issues remaining: $OPEN_SUBS"

          if [ "$OPEN_SUBS" != "0" ]; then
            echo "Still $OPEN_SUBS open sub-issue(s) — not closing parent yet"
            exit 0
          fi

          # Check parent is still open
          PARENT_STATE=$(gh issue view $PARENT_NUM \
            --repo ${{ github.repository }} \
            --json state --jq '.state')

          if [ "$PARENT_STATE" != "OPEN" ]; then
            echo "Parent #$PARENT_NUM is already $PARENT_STATE — skipping"
            exit 0
          fi

          echo "All sub-issues closed — closing parent #$PARENT_NUM"

          gh issue comment $PARENT_NUM \
            --repo ${{ github.repository }} \
            --body "✅ All sub-issues completed. Closing automatically.

          _Closed by Close Parent Issue workflow_"

          gh issue close $PARENT_NUM \
            --repo ${{ github.repository }} \
            --reason completed
