name: Close Parent Issue

on:
  issues:
    types: [closed]

permissions:
  contents: read
  issues: write

jobs:
  close-parent:
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    if: contains(github.event.issue.labels.*.name, 'sub-issue')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Check if all sub-issues are closed
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BODY="${{ github.event.issue.body }}"
          PARENT_NUM=$(echo "$BODY" | grep -oP 'Parent:\s*#\K[0-9]+' | head -1)

          if [ -z "$PARENT_NUM" ]; then
            echo "No parent issue found — skipping"
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PARENT_STATE=$(gh issue view $PARENT_NUM \
            --repo ${{ github.repository }} \
            --json state --jq '.state')

          if [ "$PARENT_STATE" != "OPEN" ]; then
            echo "Parent #$PARENT_NUM already $PARENT_STATE — skipping"
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          OPEN_SUBS=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "sub-issue" \
            --state open \
            --limit 100 \
            --json number,body \
            --jq "[.[] | select(.body | test(\"Parent:\\\\s*#${PARENT_NUM}\"))] | length")

          echo "Open sub-issues remaining: $OPEN_SUBS"

          if [ "$OPEN_SUBS" != "0" ]; then
            echo "Still $OPEN_SUBS open — not ready"
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "PARENT_NUM=$PARENT_NUM" >> $GITHUB_ENV
          echo "proceed=true" >> $GITHUB_OUTPUT

      - name: Collect verification context
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input

          echo "## Parent Issue" > input/verify_context.md
          gh issue view $PARENT_NUM \
            --repo ${{ github.repository }} \
            >> input/verify_context.md

          echo "" >> input/verify_context.md
          echo "## Closed Sub-Issues" >> input/verify_context.md
          gh issue list \
            --repo ${{ github.repository }} \
            --label "sub-issue" \
            --state closed \
            --limit 100 \
            --json number,title,body \
            --jq ".[] | select(.body | test(\"Parent:\\\\s*#${PARENT_NUM}\")) | \"### #\\(.number): \\(.title)\\n\\(.body)\"" \
            >> input/verify_context.md

          echo "" >> input/verify_context.md
          echo "## Recent merged PRs (git log)" >> input/verify_context.md
          git log --oneline -20 >> input/verify_context.md

          echo "" >> input/verify_context.md
          echo "## Git diff of relevant files (last 5 merges)" >> input/verify_context.md
          git diff HEAD~5 HEAD -- src/ >> input/verify_context.md 2>/dev/null || true

          echo "Context ready:"
          wc -l input/verify_context.md

      - name: Run Claude — verify acceptance criteria
        if: steps.check.outputs.proceed == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a QA Agent verifying whether a parent GitHub issue can be marked Done.

          Read input/verify_context.md — it contains:
          - The parent issue with its goal and acceptance criteria
          - All closed sub-issues and what they implemented
          - Recent git log and diff of src/ files

          ## Your job
          Check whether the acceptance criteria in the parent issue are actually satisfied
          by what was implemented in the sub-issues and visible in the git diff.

          ## Decision rules

          CLOSE THE PARENT if:
          - Every acceptance criterion in the parent issue is covered by at least one sub-issue
          - The relevant code changes are visible in the git diff
          - No criterion is obviously missing or only partially addressed

          DO NOT CLOSE if:
          - One or more acceptance criteria have no corresponding implementation
          - The git diff shows the code is incomplete or broken
          - A sub-issue was closed but its implementation doesn't match what was required

          ## Actions

          If all criteria are met — close the parent and move to Done:
          gh issue comment \$PARENT_NUM --repo \$REPO --body \"✅ **QA verification passed** — all acceptance criteria satisfied.

          [brief summary of what was verified]

          _Verified by Close Parent Agent_\"
          gh issue close \$PARENT_NUM --repo \$REPO --reason completed
          echo 'CLOSE_RESULT=done' >> \$GITHUB_ENV

          If criteria are NOT met — create new sub-issues for each gap and continue the pipeline:
          1. Comment on the parent explaining what's missing:
          gh issue comment \$PARENT_NUM --repo \$REPO --body \"⚠️ **QA found unmet criteria** — creating sub-issues for the gaps.

          ## What's missing
          [specific list of unmet criteria]

          ## What was implemented
          [brief summary of what sub-issues did cover]

          New sub-issues created and queued for implementation.

          _QA by Close Parent Agent_\"

          2. For each unmet criterion, create a new sub-issue:
          gh issue create --repo \$REPO \
            --title 'SPECIFIC_TASK_TITLE' \
            --body 'Parent: #PARENT_NUM

          DESCRIPTION_OF_WHAT_IS_MISSING

          See parent issue #PARENT_NUM for full context.' \
            --label 'sub-issue,ready'

          Ensure label exists first:
          gh label create 'ready' --color '0e8a16' --repo \$REPO 2>/dev/null || true
          gh label create 'sub-issue' --color '0075ca' --repo \$REPO 2>/dev/null || true

          echo 'CLOSE_RESULT=blocked' >> \$GITHUB_ENV

          Use PARENT_NUM=$PARENT_NUM as the issue number.
          Start by reading input/verify_context.md carefully.
          "

      - name: Move to Done on project board
        if: steps.check.outputs.proceed == 'true' && env.CLOSE_RESULT == 'done'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          chmod +x scripts/update-project-status.sh
          ./scripts/update-project-status.sh "$PARENT_NUM" "Done" || true
