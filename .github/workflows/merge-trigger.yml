name: Merge Trigger

run-name: "Merge Trigger : unit-tests passed → merge approved PRs"

on:
  workflow_run:
    workflows: ["Unit Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-trigger:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
    concurrency:
      group: merge-trigger-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge approved PRs
        id: merge
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Checking PRs for branch: $BRANCH"

          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --head "$BRANCH" \
            --state open \
            --label "pr_approved" \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No approved PRs found for branch $BRANCH — skipping"
            echo "PR_NUMBER=" >> $GITHUB_ENV
            exit 0
          fi

          echo "Merging PR #$PR"
          gh pr merge $PR \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

          echo "PR_NUMBER=$PR" >> $GITHUB_ENV

      - name: Move issue to Done
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          # Extract issue number from branch name (feature/issue-N)
          ISSUE_NUMBER=$(echo "$BRANCH" | grep -oE '[0-9]+$')

          if [ -n "$ISSUE_NUMBER" ]; then
            chmod +x scripts/update-project-status.sh
            ./scripts/update-project-status.sh "$ISSUE_NUMBER" "Done" || true
          fi
