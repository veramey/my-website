name: Merge Trigger

run-name: "Merge Trigger : unit-tests passed → merge approved PRs"

on:
  workflow_run:
    workflows: ["Unit Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-trigger:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
    concurrency:
      group: merge-trigger-${{ github.event.workflow_run.head_sha }}
      cancel-in-progress: false

    steps:
      - name: Merge approved PRs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Checking PRs for branch: $BRANCH"

          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --head "$BRANCH" \
            --state open \
            --label "pr_approved" \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No approved PRs found for branch $BRANCH — skipping"
            exit 0
          fi

          echo "Merging PR #$PR"
          gh pr merge $PR \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --delete-branch
