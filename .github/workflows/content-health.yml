name: Content Health Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  content-health:
    runs-on: ubuntu-latest

    steps:
      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 Content Health Agent Started"
          echo "⏰ $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --progress=false

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git Author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"

      - name: Collect content context
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input

          # --- 1. All internal hrefs found in source ---
          echo "## Internal Links Found in Source Code" > input/content_context.md
          grep -rh 'href="/' src/ --include="*.tsx" \
            | grep -oP 'href="\K[^"]+' \
            | sort -u \
            >> input/content_context.md 2>/dev/null || true

          # --- 2. All existing pages ---
          echo "" >> input/content_context.md
          echo "## Existing Pages (src/pages/)" >> input/content_context.md
          find src/pages -name "*.tsx" \
            | sed 's|src/pages||;s|\.tsx$||;s|/index$||' \
            | sort \
            >> input/content_context.md

          # --- 3. SEO check per page ---
          echo "" >> input/content_context.md
          echo "## SEO Status Per Page" >> input/content_context.md
          for f in $(find src/pages -name "*.tsx" | grep -v "_app\|_document\|404"); do
            PAGE=$(echo $f | sed 's|src/pages||;s|\.tsx$||')
            HAS_TITLE=$(grep -c "<title>\|og:title" $f 2>/dev/null || echo 0)
            HAS_DESC=$(grep -c 'name="description"\|og:description' $f 2>/dev/null || echo 0)
            HAS_CANONICAL=$(grep -c 'canonical\|og:url' $f 2>/dev/null || echo 0)
            echo "Page $PAGE — title:$HAS_TITLE desc:$HAS_DESC canonical:$HAS_CANONICAL" >> input/content_context.md
          done

          # --- 4. Check sitemap and robots ---
          echo "" >> input/content_context.md
          echo "## Static Files in public/" >> input/content_context.md
          ls public/ >> input/content_context.md 2>/dev/null || echo "public/ empty or missing" >> input/content_context.md

          # --- 5. Open content-related issues (avoid duplicates) ---
          echo "" >> input/content_context.md
          echo "## Already Open Issues (to avoid duplicates)" >> input/content_context.md
          gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,title \
            --jq '.[] | "#\(.number): \(.title)"' \
            >> input/content_context.md 2>/dev/null || true

          # --- 6. PRD summary ---
          echo "" >> input/content_context.md
          echo "## PRD.md (product requirements)" >> input/content_context.md
          cat PRD.md >> input/content_context.md

          echo "Context collected:"
          wc -l input/content_context.md

      - name: Run Claude — audit and act
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a Content Health Agent for an AI Ops content site (my-website).

          Read input/content_context.md — it contains:
          - All internal hrefs found in source code
          - All existing pages in src/pages/
          - SEO status per page (title/description/canonical counts)
          - What files exist in public/ (sitemap, robots, etc.)
          - Already open GitHub issues (to avoid creating duplicates)
          - The full PRD.md

          Your job: audit the site's content health and take the RIGHT action for each problem.

          ## Decision rules for each problem type

          BROKEN INTERNAL LINK (href exists in code but page doesn't exist in src/pages/):
            - Check PRD.md: is this page planned for Phase 2 or Phase 3?
              → YES: create a GitHub issue to implement it (don't create if similar issue already open)
              → NO: it might be a typo — fix the href directly with a code edit and open a PR
              → Template/download pages: create issue titled like 'Build /templates/[slug] page'

          MISSING SEO META (title:0 or desc:0 on an existing page):
            - This is a quick code fix — edit the .tsx file directly, add the missing tags, open a PR
            - Use the page URL and PRD context to write good title/description values

          MISSING SITEMAP (sitemap.xml not in public/):
            - Create a GitHub issue: 'Add sitemap.xml and robots.txt for SEO'
            - Don't create if a similar issue is already open

          MISSING ROBOTS.TXT (robots.txt not in public/):
            - Same as sitemap — single issue for both

          ## How to create a GitHub issue
          gh issue create \
            --repo \$REPO \
            --title 'TITLE' \
            --label 'content-health' \
            --body 'BODY'

          ## How to open a PR for a direct code fix
          1. Create a new branch: git checkout -b fix/content-health-DESCRIPTION
          2. Edit the relevant .tsx file(s)
          3. git add -A && git commit -m 'fix: DESCRIPTION'
          4. git push origin BRANCH_NAME
          5. gh pr create --repo \$REPO --title 'fix: DESCRIPTION' --body 'BODY' --base main --head BRANCH_NAME

          ## Rules
          - Check 'Already Open Issues' before creating any issue — avoid exact duplicates
          - Prefer direct PR fixes for small code changes (missing meta tags, typos)
          - Prefer GitHub issues for missing pages that need full implementation
          - For each action you take, explain your reasoning briefly
          - Create the 'content-health' label if needed: gh label create 'content-health' --color '0075ca' --repo \$REPO 2>/dev/null || true
          - If everything is clean, output a short summary and exit

          Start by reading input/content_context.md carefully, then reason through each finding and act.
          "
