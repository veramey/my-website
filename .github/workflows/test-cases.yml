name: Test Cases Generator

run-name: "Test Cases #${{ github.event.issue.number }} : generate QA plan"

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  test-cases:
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'ready' &&
      contains(github.event.issue.labels.*.name, 'sub-issue')

    steps:
      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Test Cases Generator Started"
          echo "📋 Issue: #${{ github.event.issue.number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write issue to file
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input output
          gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} > input/issue.md

      - name: Run Claude — generate test cases
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a QA Engineer for a Next.js content website.

          Read input/issue.md — it contains the feature to be built including acceptance criteria.

          Generate practical Playwright test cases for this specific feature.

          Output to output/test_cases.md:

          ## Test Cases

          ### Happy Path
          - [ ] [What to test and what the expected result is]
          - [ ] [Add 2-3 happy path tests]

          ### Edge Cases
          - [ ] [Edge case description and expected behavior]
          - [ ] [Add 1-2 edge cases]

          ### Already covered by smoke tests — do NOT duplicate
          - Page loads without console errors
          - Nav and footer render
          - Internal links return 200

          Keep it to 3-6 test cases total. Be specific: name exact elements, text, or behaviors to assert.
          "

      - name: Append test cases and promote to tests-ready
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ ! -f output/test_cases.md ]; then exit 0; fi

          CURRENT_BODY=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json body -q '.body')

          printf '%s\n\n%s\n\n---\n_Test cases generated by QA Agent (Claude Code)_' \
            "$CURRENT_BODY" "$(cat output/test_cases.md)" > output/new_body.txt

          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body-file output/new_body.txt

          gh label create "tests-ready" --color "006b75" --description "Test cases generated, ready for implementation" \
            --repo ${{ github.repository }} 2>/dev/null || true

          # Promote: remove ready, add tests-ready
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "ready" \
            --add-label "tests-ready" 2>/dev/null || \
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "tests-ready"

          echo "✅ Test cases added and issue promoted to tests-ready"
