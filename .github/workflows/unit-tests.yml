name: Unit Tests

on:
  pull_request:
    types: [labeled]

jobs:
  test-web:
    name: Build & test
    runs-on: ubuntu-latest
    # Only run when pr_approved label is present — prevents firing on needs-rework events
    if: github.event.label.name == 'pr_approved'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
