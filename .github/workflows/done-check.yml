name: Done Check

run-name: "Done Check : verify live site after deploy"

on:
  workflow_run:
    workflows: ["Deploy Pages"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  done-check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --progress=false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages to propagate
        run: sleep 30

      - name: Run Playwright against live site
        id: smoke
        run: |
          mkdir -p output
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            npx playwright test tests/smoke.spec.ts \
            --config playwright.live.config.ts \
            --reporter=line 2>&1 | tee output/smoke.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Check for existing open failure issue
        id: existing
        if: env.EXIT_CODE != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "bug" \
            --state open \
            --search "Done Check failed on live site" \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          echo "issue=${EXISTING}" >> $GITHUB_OUTPUT

      - name: Create bug issue if new failure
        if: env.EXIT_CODE != '0' && steps.existing.outputs.issue == ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          LOG=$(tail -80 output/smoke.log 2>/dev/null || echo "No log available")

          gh label create "bug" --color "d73a4a" --description "Bug reported" \
            --repo ${{ github.repository }} 2>/dev/null || true

          gh issue create \
            --repo ${{ github.repository }} \
            --title "🔴 Done Check failed on live site" \
            --label "bug" \
            --body "Smoke tests failed on https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} after deploy.

          ## Playwright Output
          \`\`\`
          $LOG
          \`\`\`

          ## Deploy Run
          ${{ github.event.workflow_run.html_url }}

          _Generated by Done Check Agent_"

      - name: Comment on existing issue if repeated failure
        if: env.EXIT_CODE != '0' && steps.existing.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh issue comment ${{ steps.existing.outputs.issue }} \
            --repo ${{ github.repository }} \
            --body "⚠️ Still failing after latest deploy (${{ github.event.workflow_run.html_url }})"

      - name: Report success
        if: env.EXIT_CODE == '0'
        run: echo "✅ Live site smoke tests passed — all good"
