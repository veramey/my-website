name: Workflow Failure Reporter

on:
  workflow_run:
    workflows:
      - "AI Teammate"
      - "Bug Check"
      - "PR Rework"
      - "Bug Fix Agent"
      - "Issue Breakdown"
      - "Story Refinement"
      - "Test Cases Generator"
      - "Intake Agent"
      - "Done Check"
    types: [completed]

permissions:
  issues: write

jobs:
  report-failure:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'cancelled'

    steps:
      - name: Extract issue number
        id: issue
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_NAME="${{ github.event.workflow_run.display_title }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          # Try to extract from branch name: feature/issue-N or hotfix/issue-N
          ISSUE=$(echo "$BRANCH" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' || echo "")

          # If not found in branch, try run name: "Issue #N" or "Intake #N" or "#N"
          if [ -z "$ISSUE" ]; then
            ISSUE=$(echo "$RUN_NAME" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
          fi

          echo "Branch: $BRANCH"
          echo "Run name: $RUN_NAME"
          echo "Extracted issue: $ISSUE"
          echo "number=${ISSUE}" >> $GITHUB_OUTPUT

      - name: Comment on issue
        if: steps.issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"

          gh issue comment ${{ steps.issue.outputs.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ **Workflow ${CONCLUSION}: \`${WORKFLOW}\`**

          The automated pipeline encountered an error and needs attention.

          👉 [View run logs](${RUN_URL})

          _Reported by Workflow Failure Reporter_"

      - name: Log no issue found
        if: steps.issue.outputs.number == ''
        run: |
          echo "Could not extract issue number from run — no comment posted"
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Run name: ${{ github.event.workflow_run.display_title }}"
