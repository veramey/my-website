name: Pipeline Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: pipeline-monitor
      cancel-in-progress: true

    steps:
      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 Pipeline Monitor Agent Started"
          echo "⏰ $(date -u)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect pipeline context
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input

          echo "## Open Issues" > input/pipeline_context.md
          gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,title,labels,updatedAt,comments \
            --jq '.[] | "Issue #\(.number): \(.title) | labels: \([.labels[].name] | join(", ")) | updated: \(.updatedAt)"' \
            >> input/pipeline_context.md

          echo "" >> input/pipeline_context.md
          echo "## Open Pull Requests" >> input/pipeline_context.md
          gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,title,headRefName,labels,updatedAt \
            --jq '.[] | "PR #\(.number): \(.title) | branch: \(.headRefName) | labels: \([.labels[].name] | join(", ")) | updated: \(.updatedAt)"' \
            >> input/pipeline_context.md

          echo "" >> input/pipeline_context.md
          echo "## Recent Workflow Runs (last 30)" >> input/pipeline_context.md
          gh run list \
            --repo ${{ github.repository }} \
            --limit 30 \
            --json databaseId,displayTitle,workflowName,status,conclusion,headBranch,createdAt \
            --jq '.[] | "[\(.workflowName)] \(.displayTitle) | branch: \(.headBranch) | \(.status) \(.conclusion) | \(.createdAt)"' \
            >> input/pipeline_context.md

          echo "" >> input/pipeline_context.md
          echo "## PR Comments (stuck PRs)" >> input/pipeline_context.md
          gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number,labels \
            --jq '.[] | select(
              (.labels | map(.name) | contains(["needs-rework"])) or
              (.labels | map(.name) | contains(["blocked"]))
            ) | .number' | while read PR_NUM; do
              echo "### PR #$PR_NUM comments:" >> input/pipeline_context.md
              gh pr view $PR_NUM \
                --repo ${{ github.repository }} \
                --json comments \
                --jq '.comments[-3:] | .[] | "[\(.author.login)]: \(.body[:300])"' \
                >> input/pipeline_context.md 2>/dev/null || true
            done

          echo "" >> input/pipeline_context.md
          echo "## Current UTC time" >> input/pipeline_context.md
          echo "$(date -u)" >> input/pipeline_context.md

          echo "Context collected:"
          cat input/pipeline_context.md

      - name: Run Claude — analyze and act
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a Pipeline Monitor Agent for an autonomous development pipeline (dark factory) on GitHub.

          Read input/pipeline_context.md — it contains the current state of all issues, PRs, and workflow runs.

          Your job: analyze the pipeline, identify problems, and fix them using gh CLI commands.

          ## Pipeline rules (how this system works)
          - Issues flow: opened → intake-done → refined → sub-issue+ready → tests-ready → AI Teammate → PR → Bug Check → pr_approved → Unit Tests → merged → Done
          - PRs with 'needs-rework' trigger PR Rework agent automatically (via labeled event)
          - PRs with 'pr_approved' trigger Unit Tests automatically (via labeled event)
          - If a workflow failed due to rate limit, it needs to be manually re-triggered

          ## How to identify problems

          STUCK needs-rework PR: has 'needs-rework' label AND last workflow run for that branch either failed or was >30 min ago with no success after
          STUCK pr_approved PR: has 'pr_approved' label AND no Unit Tests success run in last 30 min
          FAILED AI Teammate: workflow run shows 'failure' conclusion — check if it's rate limit or real error
          BLOCKED PR: has 'blocked' label — requires human, just report it
          STALLED ISSUE: issue has 'tests-ready' + 'sub-issue' labels but no AI Teammate run in last hour

          ## Actions you can take

          Re-trigger PR Rework (remove + re-add needs-rework label):
          gh pr edit PR_NUMBER --repo \$REPO --remove-label 'needs-rework'
          sleep 3
          gh pr edit PR_NUMBER --repo \$REPO --add-label 'needs-rework'

          Re-trigger Unit Tests (remove + re-add pr_approved label):
          gh pr edit PR_NUMBER --repo \$REPO --remove-label 'pr_approved'
          sleep 3
          gh pr edit PR_NUMBER --repo \$REPO --add-label 'pr_approved'

          Re-trigger AI Teammate for an issue:
          gh workflow run ai-teammate.yml --repo \$REPO --field issue_number=ISSUE_NUMBER

          Comment on a PR explaining what you did:
          gh pr comment PR_NUMBER --repo \$REPO --body 'MESSAGE'

          Comment on an issue:
          gh issue comment ISSUE_NUMBER --repo \$REPO --body 'MESSAGE'

          ## Rules
          - Only act on things that are genuinely stuck (>30 min with no progress)
          - Do NOT re-trigger things that are currently in_progress
          - Do NOT re-trigger more than once per run
          - For BLOCKED PRs: only comment, do not re-trigger
          - Always comment on the PR/issue explaining what you did and why
          - If everything looks healthy, output 'Pipeline is healthy — no action needed' and exit
          - Be conservative: when in doubt, report but don't act

          Start by reading input/pipeline_context.md, reasoning about each open PR and issue, then act.
          "
