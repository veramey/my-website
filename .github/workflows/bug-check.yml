name: Bug Check

run-name: "Bug Check : PR #${{ github.event.pull_request.number }} — AI review + Playwright"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bug-check:
    runs-on: ubuntu-latest
    # Only run on AI Teammate PRs (feature/issue-* or hotfix/issue-* branches)
    if: |
      startsWith(github.head_ref, 'feature/issue-') ||
      startsWith(github.head_ref, 'hotfix/issue-')
    concurrency:
      group: bug-check-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Bug Check Started"
          echo "📋 PR: #${{ github.event.pull_request.number }}"
          echo "🌿 Branch: ${{ github.head_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --progress=false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh label create "pr_approved" --color "0e8a16" --description "Approved for merge" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh label create "needs-rework" --color "e4e669" --description "Code review issues to fix" \
            --repo ${{ github.repository }} 2>/dev/null || true

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input output
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            > input/pr_diff.md
          echo "PR diff: $(wc -l < input/pr_diff.md) lines"

      - name: Run Claude — review PR diff
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a senior Next.js code reviewer for an MVP content site.

          Read the PR diff in input/pr_diff.md.

          APPROVE (STATUS: APPROVED) if the code:
          - Renders correctly without runtime errors
          - Does not crash the page or produce unhandled exceptions
          - Forms show visible feedback to the user (success OR error message)
          - Interactive elements are keyboard accessible (have labels, roles)

          REJECT (STATUS: NEEDS_FIX) ONLY for these categories:
          - Code that throws a runtime error or crashes the page
          - A form that gives zero feedback on any user action (silent submit with nothing shown)
          - Missing aria-label or label on a form input that makes it completely unusable
          - TypeScript errors or broken imports

          DO NOT reject for:
          - Missing loading/disabled states during async operations
          - Missing server-side validation (client-side is sufficient for MVP)
          - UX polish: animations, focus management, debouncing
          - Code style, unused variables, or refactoring suggestions
          - Missing features not mentioned in the issue
          - API endpoints that return mock/stub responses
          - Double-submit protection
          - Minor accessibility improvements (aria-live, role=alert on non-critical elements)

          Output to output/review.md:
          - First line must be exactly: STATUS: APPROVED or STATUS: NEEDS_FIX
          - Blank line
          - Your review notes (or 'No issues found.' if approved)
          "

      - name: Build site
        run: npm run build

      - name: Run Playwright smoke tests
        run: |
          npx playwright test tests/smoke.spec.ts --reporter=line 2>&1 | tee output/playwright.log
          echo "PLAYWRIGHT_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Evaluate and apply labels
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REVIEW_STATUS=$(head -1 output/review.md 2>/dev/null || echo "STATUS: NEEDS_FIX")
          PLAYWRIGHT_OK="${{ env.PLAYWRIGHT_EXIT }}"

          echo "Review: $REVIEW_STATUS"
          echo "Playwright exit: $PLAYWRIGHT_OK"

          if [[ "$REVIEW_STATUS" == "STATUS: APPROVED" && "$PLAYWRIGHT_OK" == "0" ]]; then
            echo "✅ All checks passed"

            # Remove needs-rework if present, add pr_approved
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --remove-label "needs-rework" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --add-label "pr_approved"

            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "✅ **Bug Check passed** — code review approved + Playwright smoke tests green.

          Merging automatically via merge-trigger workflow.

          _Reviewed by Claude Code_"

          else
            echo "❌ Checks failed"

            REVIEW_NOTES=$(tail -n +3 output/review.md 2>/dev/null || echo "Review failed to run.")
            PLAYWRIGHT_LOG=$(tail -50 output/playwright.log 2>/dev/null || echo "Playwright did not run.")

            # Remove pr_approved if present, add needs-rework
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --remove-label "pr_approved" 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --add-label "needs-rework"

            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "❌ **Bug Check failed** — issues found below. PR Rework Agent will fix automatically.

          ## Code Review
          $REVIEW_NOTES

          ## Playwright Output
          \`\`\`
          $PLAYWRIGHT_LOG
          \`\`\`

          _Reviewed by Claude Code_"
          fi
