name: Bug Check

run-name: "Bug Check : PR #${{ github.event.pull_request.number }} — AI review + Playwright"

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bug-check:
    runs-on: ubuntu-latest
    # Only run on AI Teammate PRs (feature/issue-* branches)
    if: ${{ startsWith(github.head_ref, 'feature/issue-') }}
    concurrency:
      group: bug-check-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Bug Check Started"
          echo "📋 PR: #${{ github.event.pull_request.number }}"
          echo "🌿 Branch: ${{ github.head_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --progress=false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input output
          gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            > input/pr_diff.md
          echo "PR diff saved ($(wc -l < input/pr_diff.md) lines)"

      - name: Run Claude — review PR diff
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a senior Next.js code reviewer.

          Read the PR diff in input/pr_diff.md.

          Your job: identify any bugs, broken logic, missing edge cases, or accessibility issues.

          Rules:
          - Be specific: point to exact files and line numbers
          - Only flag real bugs, not style preferences
          - If the code looks good, say so clearly

          Output to output/review.md:
          - First line must be exactly: STATUS: APPROVED or STATUS: NEEDS_FIX
          - Then a blank line
          - Then your review notes (or 'No issues found.' if approved)
          "

      - name: Build site
        run: npm run build

      - name: Run Playwright smoke tests
        id: playwright
        run: |
          npx playwright test --reporter=line 2>&1 | tee output/playwright.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Evaluate results and label PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          REVIEW_STATUS=$(head -1 output/review.md 2>/dev/null || echo "STATUS: NEEDS_FIX")
          PLAYWRIGHT_OK="${{ env.EXIT_CODE }}"

          echo "Review: $REVIEW_STATUS"
          echo "Playwright exit: $PLAYWRIGHT_OK"

          if [[ "$REVIEW_STATUS" == "STATUS: APPROVED" && "$PLAYWRIGHT_OK" == "0" ]]; then
            echo "✅ All checks passed — labeling pr_approved"
            gh label create "pr_approved" --color "0e8a16" --description "Approved for merge" \
              --repo ${{ github.repository }} 2>/dev/null || true
            gh pr edit ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --add-label "pr_approved"
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "✅ **Bug Check passed** — code review approved + Playwright smoke tests green.

          Merging automatically via merge-trigger workflow.

          _Reviewed by Claude Code_"
          else
            echo "❌ Checks failed — creating fix issue"

            REVIEW_NOTES=$(tail -n +3 output/review.md 2>/dev/null || echo "Review failed to run.")
            PLAYWRIGHT_LOG=$(tail -50 output/playwright.log 2>/dev/null || echo "Playwright did not run.")

            ISSUE_NUMBER=$(echo "${{ github.head_ref }}" | grep -oE '[0-9]+$')

            gh label create "bug" --color "d73a4a" --description "Bug found in code review" \
              --repo ${{ github.repository }} 2>/dev/null || true

            gh issue create \
              --repo ${{ github.repository }} \
              --title "Fix: bug check failed on PR #${{ github.event.pull_request.number }}" \
              --label "bug,sub-issue" \
              --body "Parent: #${ISSUE_NUMBER}

          ## Code Review
          ${REVIEW_NOTES}

          ## Playwright Output
          \`\`\`
          ${PLAYWRIGHT_LOG}
          \`\`\`

          Fix the issues above and re-push to branch \`${{ github.head_ref }}\`.

          _Generated by Bug Check workflow_"

            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "❌ **Bug Check failed** — see the newly created fix issue for details.

          _Reviewed by Claude Code_"
          fi
