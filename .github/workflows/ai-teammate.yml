name: AI Teammate

run-name: "Issue #${{ inputs.issue_number || github.event.issue.number }} : AI implementation"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number to implement (e.g. 1)'
        required: true
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-teammate:
    runs-on: ubuntu-latest
    # For label trigger: only fire on 'tests-ready' label on sub-issues
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'tests-ready' && contains(github.event.issue.labels.*.name, 'sub-issue'))
    concurrency:
      group: ai-teammate-${{ inputs.issue_number || github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Job Info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🤖 AI Teammate Started"
          echo "🎫 Issue: #${{ steps.issue.outputs.number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --progress=false

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git Author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"

      - name: Move issue to In progress
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          chmod +x scripts/update-project-status.sh
          ./scripts/update-project-status.sh ${{ steps.issue.outputs.number }} "In progress" || true

      - name: Fetch GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p input
          gh issue view ${{ steps.issue.outputs.number }} \
            --repo ${{ github.repository }} \
            > input/issue.md
          echo "Issue fetched:"
          cat input/issue.md

      - name: Create feature branch
        run: |
          BRANCH="feature/issue-${{ steps.issue.outputs.number }}"
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are a senior Next.js developer working on an AI Ops content site for small agencies.

          Read the GitHub issue in input/issue.md and implement the requested feature.

          Project context:
          - Stack: Next.js 15, React 19, TypeScript, Tailwind CSS
          - Structure: src/pages/ (pages), src/components/ (components), src/styles/ (styles)
          - PRD is in PRD.md — read it for product context
          - Design: clean, minimal, professional. No flashy elements.

          Instructions:
          1. Read input/issue.md to understand what needs to be built
          2. Read PRD.md for product context
          3. Implement the feature — create or modify only the necessary files
          4. Do not over-engineer. Keep it simple.
          5. Write a short summary of what you did to output/summary.md
          6. Write Playwright tests for what you built to tests/feature-${{ steps.issue.outputs.number }}.spec.ts
             (import from @playwright/test, use baseURL from config, test only what this issue adds)

          Start now.
          "

      - name: Commit changes
        run: |
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: implement issue #${{ steps.issue.outputs.number }}

          Implemented by AI Teammate via Claude Code.
          Closes #${{ steps.issue.outputs.number }}"

      - name: Push branch
        run: git push origin $BRANCH --force

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          SUMMARY=""
          if [ -f output/summary.md ]; then
            SUMMARY=$(cat output/summary.md)
          fi

          gh pr create \
            --repo ${{ github.repository }} \
            --title "feat: issue #${{ steps.issue.outputs.number }}" \
            --body "$(cat <<EOF
          ## Summary
          $SUMMARY

          Closes #${{ steps.issue.outputs.number }}

          ---
          🤖 Implemented by AI Teammate (Claude Code)
          EOF
          )" \
            --base main \
            --head $BRANCH || true

      - name: Move issue to In review
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ./scripts/update-project-status.sh ${{ steps.issue.outputs.number }} "In review" || true
